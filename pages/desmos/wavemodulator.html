<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhammad Hussaini | Wave Modulator</title>
    <link rel="shortcut icon" href="../../images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://unpkg.com/scrollreveal"></script>
    <script src="https://www.desmos.com/api/v1.8/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fda6"></script>
</head>

<body>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .top {
            position: absolute;
            z-index: 1000;
            top: 0;
            left: 0;
            right: 0;
            height: 46px;
            background: linear-gradient(black, rgb(45, 45, 45));
            color: aliceblue;
        }

        .back {
            background-color: rgb(58, 58, 58);
            width: min-content;
            padding: 10px 20px;
            font-size: 1.5rem;
            transition: .5s all;
        }

        .back:hover {
            text-shadow: 0px 0px 5px aliceblue;
            cursor: pointer;
            transform: scale(1.2)
        }

        #calculator {
            z-index: 2000;
        }
    </style>
    <div id="preloader">
        <div></div>
    </div>
    <div class="top">
        <div class="back" onclick="javascript:history.back()">
            <i class="bi bi-arrow-left-circle-fill"></i>
        </div>
    </div>
    <div id="calculator"></div>
    <script src="../../scripts/sub/wm.js"></script>
</body>

</html>
